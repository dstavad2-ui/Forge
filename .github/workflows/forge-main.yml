name: Forge Automation  

on:  
  push:  
    branches:  
      - main  
  pull_request:  
    branches:  
      - main  

jobs:  
  build:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v2  

      - name: Set up Node.js  
        uses: actions/setup-node@v2  
        with:  
          node-version: '14'  

      - name: Install dependencies  
        run: npm install  

      - name: Lint code  
        run: npm run lint  

      - name: Run tests  
        run: npm test  

      - name: Deploy  
        run: |  
          echo 'Deploying to production...'  
          # Add your deploy script here  

      - name: Error Handling  
        if: ${{ failure() }}  
        run: echo 'An error occurred during the workflow.'  
